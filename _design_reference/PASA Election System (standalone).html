document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0vh; font-family:'Public Sans',sans-serif; color:#16241C; background:#ECEAE0; -webkit-font-smoothing:antialiased;\">\n\n  <!-- PROTOTYPE NAV STRIP -->\n  <div style=\"display:flex; align-items:center; gap:14px; background:#0A3D26; color:#CFE6D8; padding:8px 18px; font-size:12px; letter-spacing:.04em; position:sticky; top:0; z-index:60;\">\n    <span style=\"display:flex; align-items:center; gap:7px; font-weight:700; color:#C8932A; letter-spacing:.14em;\">\n      <span style=\"width:6px; height:6px; border-radius:50%; background:#C8932A; display:inline-block;\"><\u002Fspan>PROTOTYPE\n    <\u002Fspan>\n    <span style=\"opacity:.45;\">|<\u002Fspan>\n    <div style=\"display:flex; gap:4px;\">\n      <button onclick=\"{{ goPortal }}\" style=\"{{ navHomeStyle }}\">Home<\u002Fbutton>\n      <button onclick=\"{{ goLandingVoter }}\" style=\"{{ navVoterStyle }}\">Voter<\u002Fbutton>\n      <button onclick=\"{{ goAdmin }}\" style=\"{{ navAdminStyle }}\">Admin<\u002Fbutton>\n      <button onclick=\"{{ goObserver }}\" style=\"{{ navObserverStyle }}\">Observer<\u002Fbutton>\n    <\u002Fdiv>\n    <span style=\"margin-left:auto; opacity:.6; font-size:11px;\">Demo data · OYSCATECH<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- ===================== PORTAL ===================== -->\n  <sc-if value=\"{{ isPortal }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"animation:fadeUp .45s ease both; min-height:calc(100vh - 36px); display:flex; flex-direction:column; background:radial-gradient(120% 90% at 80% -10%, #0E5A37 0%, #093821 55%, #06281A 100%);\">\n    <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:56px 24px; text-align:center; color:#F4F1E6;\">\n      <div style=\"width:84px; height:84px; border-radius:50%; background:#0A3D26; border:2px solid #C8932A; display:flex; align-items:center; justify-content:center; box-shadow:0 14px 40px rgba(0,0,0,.4); margin-bottom:24px;\">\n        <svg width=\"46\" height=\"46\" viewBox=\ A\"><\u002Fpath><path d=\"M32 16c-6 2-9 7-9 14 6-2 9-7 9-14z\" fill=\"#C8932A\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"line-height:1.3;\">\n        <div style=\"font-family:'Spectral',serif; font-size:16px; font-weight:600;\">Oyo State College of Agriculture and Technology<\u002Fdiv>\n        <div style=\"font-size:12px; color:#9FBFAE;\">Dept. of Public Administration · PASA Executive Election 2026<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"max-width:980px; margin:0 auto; padding:46px 24px 64px;\">\n      <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:14px;\">\n        <span style=\"display:flex; align-items:center; gap:7px; background:#E2F0E7; color:#0E5A37; padding:6px 12px; border-radius:999px; font-size:12.5px; font-weight:700; letter-spacing:.03em;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#2DA05A; display:inline-block; animation:livePulse 2s infinite;\"><\u002Fspan>Voting open<\u002Fspan>\n        <span style=\"color:#5C6B61; font-size:13px;\">Closes 18 June 2026, 4:00 PM<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"font-family:'Spectral',serif; font-weight:600; font-size:40px; line-height:1.1; margin:0 0 14px; max-width:680px;\">Elect the next executive council of your association<\u002Fh1>\n      <p style=\"font-size:16px; line-height:1.65; color:#46554C; max-width:600px; margin:0 0 32px;\">Your ballot is private and counts once. Have your matriculation number ready to begin — the process takes about two minutes.<\u002Fp>\n\n      <button onclick=\"{{ goLogin }}\" style=\"background:#0E5A37; color:#fff; border:none; border-radius:11px; padding:15px 30px; font-size:15.5px; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:10px; box-shadow:0 10px 26px rgba(14,90,55,.32); transition:transform .16s ease, box-shadow .16s ease;\" style-hover=\"transform:translateY(-2px); box-shadow:0 16px 34px rgba(14,90,55,.4);\">\n        Proceed to verification\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n\n      <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:46px;\">\n        <div style=\"background:#fff; border:1px solid #E4E0D4; border-radius:13px; padding:20px;\">\n          <div style=\"font-family:'Spectral',serif; font-size:30px; font-weight:600; color:#0E5A37;\">5<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#5C6B61; margin-top:2px;\">Positions on the ballot<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E4E0D4; border-radius:13px; padding:20px;\">\n          <div style=\"font-family:'Spectral',serif; font-size:30px; font-weight:600; color:#0E5A37;\">12<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#5C6B61; margin-top:2px;\">Accredited candidates<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E4E0D4; border-radius:13px; padding:20px;\">\n          <div style=\"font-family:'Spectral',serif; font-size:30px; font-weight:600; color:#0E5A37;\">312<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#5C6B61; margin-top:2px;\">Eligible voters<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E4E0D4; border-radius:13px; padding:20px;\">\n          <div style=\"font-family:'Spectral',serif; font-size:30px; font-weight:600; color:#0E5A37;\">~2 min<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#5C6B61; margin-top:2px;\">Average time to vote<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:36px;\">\n        <div style=\"background:#fff; border:1px solid #E4E0D4; border-radius:15px; padding:26px;\">\n          <h3 style=\"font-family:'Spectral',serif; font-size:19px; font-weight:600; margin:0 0 16px;\">How voting works<\u002Fh3>\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <div style=\"display:flex; gap:13px; align-items:flex-start;\"><span style=\"width:24px; height:24px; border-radius:50%; background:#E2F0E7; color:#0E5A37; font-size:12.5px; font-weight:700; display:flex; align-items:center; justify-content:center; flex:none;\">1<\u002Fspan><div style=\"font-size:14px; line-height:1.5; color:#46554C;\">Enter your matriculation number to confirm eligibility.<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; gap:13px; align-items:flex-start;\"><span style=\"width:24px; height:24px; border-radius:50%; background:#E2F0E7; color:#0E5A37; font-size:12.5px; font-weight:700; display:flex; align-items:center; justify-content:center; flex:none;\">2<\u002Fspan><div style=\"font-size:14px; line-height:1.5; color:#46554C;\">Choose one candidate for each position, one page at a time.<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; gap:13px; align-items:flex-start;\"><span style=\"width:24px; height:24px; border-radius:50%; background:#E2F0E7; color:#0E5A37; font-size:12.5px; font-weight:700; display:flex; align-items:center; justify-content:center; flex:none;\">3<\u002Fspan><div style=\"font-size:14px; line-height:1.5; color:#46554C;\">Review your choices and submit. You receive a sealed receipt.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#0E5A37; color:#E6F1EA; border-radius:15px; padding:26px;\">\n          <h3 style=\"font-family:'Spectral',serif; font-size:19px; font-weight:600; margin:0 0 16px; color:#fff;\">Your vote is protected<\u002Fh3>\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <div style=\"display:flex; gap:11px; align-items:flex-start;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C8932A\" stroke-width=\"2.2\" style=\"flex:none; margin-top:1px;\"><path d=\"M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z\"><\u002Fpath><\u002Fsvg><div style=\"font-size:14px; line-height:1.5;\"><strong style=\"color:#fff;\">One vote per matric.<\u002Fstrong> A second attempt is automatically flagged.<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; gap:11px; align-items:flex-start;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C8932A\" stroke-width=\"2.2\" style=\"flex:none; margin-top:1px;\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg><div style=\"font-size:14px; line-height:1.5;\"><strong style=\"color:#fff;\">Anonymous ballot.<\u002Fstrong> Your identity is never linked to your selections.<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; gap:11px; align-items:flex-start;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C8932A\" stroke-width=\"2.2\" style=\"flex:none; margin-top:1px;\"><path d=\"M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><\u002Fsvg><div style=\"font-size:14px; line-height:1.5;\"><strong style=\"color:#fff;\">Independently observed.<\u002Fstrong> Accredited observers monitor the live count.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== LOGIN ===================== -->\n  <sc-if value=\"{{ isLogin }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"animation:fadeUp .4s ease both; min-height:calc(100vh - 36px); display:flex; align-items:center; justify-content:center; padding:40px 22px; background:radial-gradient(120% 100% at 50% -20%, #114D33 0%, #0A3D26 60%, #082E1D 100%);\">\n    <div style=\"width:100%; max-width:430px;\">\n      <div style=\"text-align:center; margin-bottom:24px;\">\n        <div style=\"width:56px; height:56px; border-radius:50%; background:#0A3D26; border:1.5px solid #C8932A; display:inline-flex; align-items:center; justify-content:center; margin-bottom:14px;\">\n          <svg width=\"30\" height=\"30\" viewBox=\"0 0 46 46\" fill=\"none\"><path d=\"M23 7c5 6 5 12 0 18-5-6-5-12 0-18z\" fill=\"#7FC79A\"><\u002Fpath><path d=\"M14 16c6 2 9 7 9 14-6-2-9-7-9-14z\" fill=\"#C8932A\"><\u002Fpath><path d=\"M32 16c-6 2-9 7-9 14 6-2 9-7 9-14z\" fill=\"#C8932A\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h1 style=\"font-family:'Spectral',serif; font-weight:600; font-size:25px; color:#F4F1E6; margin:0 0 6px;\">Verify your eligibility<\u002Fh1>\n        <p style=\"font-size:13.5px; color:#9FBFAE; margin:0;\">Enter the matriculation number on your student record.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border-radius:16px; padding:28px; box-shadow:0 20px 50px rgba(0,0,0,.35);\">\n        <label style=\"display:block; font-size:13px; font-weight:600; color:#3A483F; margin-bottom:8px;\">Matriculation number<\u002Flabel>\n        <input value=\"{{ matricInput }}\" oninput=\"{{ onMatricInput }}\" onkeydown=\"{{ onMatricKey }}\" placeholder=\"e.g. PUB/22/014\" style=\"width:100%; padding:14px 15px; border:1.5px solid #D8D3C4; border-radius:10px; font-size:16px; letter-spacing:.04em; text-transform:uppercase; outline:none; transition:border-color .15s ease;\" style-focus=\"border-color:#0E5A37;\">\n        <sc-if value=\"{{ loginError }}\" hint-placeholder-val=\"\">\n          <div style=\"display:flex; gap:9px; align-items:flex-start; margin-top:12px; background:#FBEAEA; border:1px solid #F0CFCF; color:#A12B2B; padding:11px 13px; border-radius:9px; font-size:13px; line-height:1.45;\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" style=\"flex:none; margin-top:1px;\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 8v5M12 16.5v.01\"><\u002Fpath><\u002Fsvg>\n            <span>{{ loginError }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <button onclick=\"{{ submitLogin }}\" style=\"width:100%; margin-top:18px; background:#0E5A37; color:#fff; border:none; border-radius:10px; padding:14px; font-size:15px; font-weight:700; cursor:pointer; transition:background .15s ease;\" style-hover=\"background:#0B4A2D;\">Verify &amp; continue<\u002Fbutton>\n        <div style=\"margin-top:18px; padding-top:16px; border-top:1px dashed #E0DBCC; font-size:12px; color:#7A887E; line-height:1.6;\">\n          <strong style=\"color:#46554C;\">Demo numbers:<\u002Fstrong> PUB/22/014 · PUB/22/027 · PUB/23/102 &nbsp;<br>\n          <span style=\"color:#B0651F;\">PUB/22/001<\u002Fspan> has already voted — try it to see the duplicate-vote flag.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== BALLOT ===================== -->\n  <sc-if value=\"{{ isBallot }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"min-height:calc(100vh - 36px); background:#F2F0E6;\">\n    <div style=\"background:#fff; border-bottom:1px solid #E4E0D4; padding:16px 24px;\">\n      <div style=\"max-width:860px; margin:0 auto;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;\">\n          <span style=\"font-size:12.5px; color:#5C6B61;\">Voting as <strong style=\"color:#16241C;\">{{ currentUserName }}<\u002Fstrong><\u002Fspan>\n          <span style=\"font-size:12.5px; font-weight:700; color:#0E5A37;\">Position {{ positionNumber }} of {{ totalPositions }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"height:7px; background:#E8E4D6; border-radius:99px; overflow:hidden;\">\n          <div style=\"height:100%; background:linear-gradient(90deg,#0E5A37,#2DA05A); border-radius:99px; width:{{ progressPct }}%; transition:width .35s ease;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div key=\"{{ ballotKey }}\" style=\"max-width:860px; margin:0 auto; padding:34px 24px 120px; animation:fadeUp .32s ease both;\">\n      <div style=\"text-align:center; margin-bottom:26px;\">\n        <div style=\"font-size:12px; letter-spacing:.22em; text-transform:uppercase; color:#C8932A; font-weight:700; margin-bottom:8px;\">Select one candidate<\u002Fdiv>\n        <h2 style=\"font-family:'Spectral',serif; font-weight:600; font-size:32px; margin:0;\">{{ currentPositionTitle }}<\u002Fh2>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px;\">\n        <sc-for list=\"{{ currentCandidates }}\" as=\"cand\" hint-placeholder-count=\"3\">\n          <div onclick=\"{{ cand.onSelect }}\" style=\"background:#fff; border:2px solid {{ cand.borderColor }}; border-radius:15px; padding:20px; cursor:pointer; position:relative; transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease; box-shadow:{{ cand.shadow }};\" style-hover=\"transform:translateY(-3px); box-shadow:0 14px 30px rgba(0,0,0,.12);\">\n            <sc-if value=\"{{ cand.selected }}\" hint-placeholder-val=\"\">\n              <div style=\"position:absolute; top:13px; right:13px; width:26px; height:26px; border-radius:50%; background:#0E5A37; display:flex; align-items:center; justify-content:center; animation:popIn .3s ease;\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 6\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"width:74px; height:74px; border-radius:50%; background:{{ cand.avatarBg }}; color:#fff; font-family:'Spectral',serif; font-size:26px; font-weight:600; display:flex; align-items:center; justify-content:center; margin-bottom:14px;\">{{ cand.initials }}<\u002Fdiv>\n            <div style=\"font-family:'Spectral',serif; font-size:19px; font-weight:600; line-height:1.2;\">{{ cand.name }}<\u002Fdiv>\n            <div style=\"font-size:12.5px; color:#6B7A6F; margin-top:3px;\">{{ cand.level }}<\u002Fdiv>\n            <button onclick=\"{{ cand.onView }}\" style=\"margin-top:13px; background:transparent; border:1px solid #D8D3C4; color:#0E5A37; border-radius:8px; padding:7px 12px; font-size:12.5px; font-weight:600; cursor:pointer; transition:background .15s ease;\" style-hover=\"background:#F2F0E6;\">View manifesto<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <button onclick=\"{{ abstainCurrent }}\" style=\"display:block; margin:22px auto 0; background:transparent; border:none; color:#8A968C; font-size:13px; cursor:pointer; text-decoration:underline; text-underline-offset:3px;\">I prefer to abstain for this position<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div style=\"position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #E4E0D4; padding:14px 24px; box-shadow:0 -6px 20px rgba(0,0,0,.06);\">\n      <div style=\"max-width:860px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; gap:12px;\">\n        <button onclick=\"{{ prevPosition }}\" style=\"background:#F2F0E6; border:1px solid #E0DBCC; color:#46554C; border-radius:10px; padding:12px 20px; font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:8px;\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 12H5M11 6l-6 6 6 6\"><\u002Fpath><\u002Fsvg>{{ prevLabel }}\n        <\u002Fbutton>\n        <span style=\"font-size:12.5px; color:#8A968C;\">{{ selectedCountLabel }}<\u002Fspan>\n        <button onclick=\"{{ nextPosition }}\" style=\"background:#0E5A37; color:#fff; border:none; border-radius:10px; padding:12px 24px; font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px;\" style-hover=\"background:#0B4A2D;\">\n          {{ nextLabel }}<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== REVIEW ===================== -->\n  <sc-if value=\"{{ isReview }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"animation:fadeUp .4s ease both; min-height:calc(100vh - 36px); background:#F2F0E6; padding:40px 22px 70px;\">\n    <div style=\"max-width:640px; margin:0 auto;\">\n      <div style=\"text-align:center; margin-bottom:28px;\">\n        <div style=\"font-size:12px; letter-spacing:.22em; text-transform:uppercase; color:#C8932A; font-weight:700; margin-bottom:8px;\">Final step<\u002Fdiv>\n        <h2 style=\"font-family:'Spectral',serif; font-weight:600; font-size:30px; margin:0 0 6px;\">Review your ballot<\u002Fh2>\n        <p style=\"font-size:14px; color:#5C6B61; margin:0;\">Confirm your choices below. Once submitted, your ballot is sealed and cannot be changed.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #E4E0D4; border-radius:15px; overflow:hidden;\">\n        <sc-for list=\"{{ reviewItems }}\" as=\"item\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex; align-items:center; gap:14px; padding:16px 20px; border-bottom:1px solid #EFEBDE;\">\n            <div style=\"width:44px; height:44px; border-radius:50%; background:{{ item.avatarBg }}; color:#fff; font-family:'Spectral',serif; font-size:16px; font-weight:600; display:flex; align-items:center; justify-content:center; flex:none;\">{{ item.initials }}<\u002Fdiv>\n            <div style=\"flex:1; min-width:0;\">\n              <div style=\"font-size:11.5px; letter-spacing:.06em; text-transform:uppercase; color:#8A968C; font-weight:700;\">{{ item.position }}<\u002Fdiv>\n              <div style=\"font-family:'Spectral',serif; font-size:17px; font-weight:600; color:{{ item.nameColor }};\">{{ item.name }}<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ item.onEdit }}\" style=\"background:transparent; border:1px solid #D8D3C4; color:#0E5A37; border-radius:8px; padding:7px 13px; font-size:12.5px; font-weight:600; cursor:pointer;\" style-hover=\"background:#F2F0E6;\">Change<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <button onclick=\"{{ submitBallot }}\" style=\"width:100%; margin-top:20px; background:#0E5A37; color:#fff; border:none; border-radius:12px; padding:16px; font-size:16px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; box-shadow:0 12px 28px rgba(14,90,55,.3);\" style-hover=\"background:#0B4A2D;\">\n        <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z\"><\u002Fpath><path d=\"M9 12l2 2 4-4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        Submit my sealed ballot\n      <\u002Fbutton>\n      <button onclick=\"{{ backToBallot }}\" style=\"display:block; margin:14px auto 0; background:transparent; border:none; color:#8A968C; font-size:13px; cursor:pointer; text-decoration:underline; text-underline-offset:3px;\">Back to selection<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== SUCCESS ===================== -->\n  <sc-if value=\"{{ isSuccess }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"animation:fadeUp .4s ease both; min-height:calc(100vh - 36px); display:flex; align-items:center; justify-content:center; padding:40px 22px; background:radial-gradient(120% 100% at 50% -10%, #114D33 0%, #0A3D26 60%, #082E1D 100%);\">\n    <div style=\"width:100%; max-width:440px; text-align:center; color:#F4F1E6;\">\n      <div style=\"width:92px; height:92px; border-radius:50%; background:rgba(45,160,90,.18); border:2px solid #2DA05A; display:inline-flex; align-items:center; justify-content:center; margin-bottom:24px; animation:popIn .5s ease both;\">\n        <svg width=\"48\" height=\"48\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#7FE0A5\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 13l4 4L19 7\" stroke-dasharray=\"60\" style=\"animation:drawCheck .6s .25s ease both;\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <h1 style=\"font-family:'Spectral',serif; font-weight:600; font-size:30px; margin:0 0 12px;\">Your vote has been recorded<\u002Fh1>\n      <p style=\"font-size:15px; line-height:1.6; color:#A9C4B5; margin:0 0 26px;\">Thank you, {{ currentUserName }}. Your ballot has been sealed and added to the count. This matriculation number can no longer vote.<\u002Fp>\n      <div style=\"background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.16); border-radius:13px; padding:20px;\">\n        <div style=\"font-size:11.5px; letter-spacing:.14em; text-transform:uppercase; color:#8FB29E; margin-bottom:7px;\">Your verification receipt<\u002Fdiv>\n        <div style=\"font-family:'Spectral',serif; font-size:26px; font-weight:600; letter-spacing:.08em; color:#fff;\">{{ receipt }}<\u002Fdiv>\n        <div style=\"font-size:12px; color:#8FB29E; margin-top:7px;\">Keep this code. Observers can confirm your ballot was counted without revealing your choices.<\u002Fdiv>\n      <\u002Fdiv>\n      <button onclick=\"{{ goPortal }}\" style=\"margin-top:26px; background:#C8932A; color:#16241C; border:none; border-radius:10px; padding:13px 26px; font-size:14.5px; font-weight:700; cursor:pointer;\">Return to home<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== FLAGGED ===================== -->\n  <sc-if value=\"{{ isFlagged }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"animation:fadeUp .4s ease both; min-height:calc(100vh - 36px); display:flex; align-items:center; justify-content:center; padding:40px 22px; background:radial-gradient(120% 100% at 50% -10%, #5A2418 0%, #3D1812 60%, #2C110D 100%);\">\n    <div style=\"width:100%; max-width:440px; text-align:center; color:#F6E9E5;\">\n      <div style=\"width:88px; height:88px; border-radius:50%; background:rgba(214,108,80,.18); border:2px solid #D66C50; display:inline-flex; align-items:center; justify-content:center; margin-bottom:22px; animation:popIn .45s ease both;\">\n        <svg width=\"44\" height=\"44\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F0A78F\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#E8927A; font-weight:700; margin-bottom:10px;\">Duplicate vote blocked<\u002Fdiv>\n      <h1 style=\"font-family:'Spectral',serif; font-weight:600; font-size:28px; margin:0 0 12px;\">This number has already voted<\u002Fh1>\n      <p style=\"font-size:15px; line-height:1.6; color:#D8B6AC; margin:0 0 24px;\">Matric <strong style=\"color:#fff;\">{{ flaggedMatric }}<\u002Fstrong> cast a ballot at an earlier time. Each matriculation number is permitted exactly one vote, so this attempt has been recorded and flagged for review.<\u002Fp>\n      <div style=\"background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.14); border-radius:12px; padding:16px 20px; text-align:left; font-size:13px; line-height:1.6; color:#D8B6AC;\">\n        If you believe this is an error, contact the electoral committee at the Department of Public Administration with your student ID. This incident reference: <strong style=\"color:#fff;\" =\"{{ admResultsStyle }}\">Results<\u002Fbutton>\n      <button onclick=\"{{ setAdminSettings }}\" style=\"{{ admSettingsStyle }}\">Settings<\u002Fbutton>\n      <div style=\"margin-top:auto; padding:12px 10px 0; font-size:11px; color:#6F9682; line-height:1.5;\">Signed in as<br><strong style=\"color:#CFE0D6;\">Electoral Officer<\u002Fstrong><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- admin content -->\n    <div style=\"flex:1; min-width:0; background:#F2F0E6; padding:30px 34px 60px;\">\n\n      <!-- OVERVIEW -->\n      <sc-if value=\"{{ admIsOverview }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"animation:fadeUp .3s ease both;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:22px;\">\n          <div><h1 style=\"font-family:'Spectral',serif; font-weight:600; font-size:27px; margin:0 0 4px;\">Election overview<\u002Fh1><p style=\"font-size:13.5px; color:#5C6B61; margin:0;\">Live status of the PASA Executive Election 2026.<\u002Fp><\u002Fdiv>\n          <span style=\"display:flex; align-items:center; gap:8px; background:#E2F0E7; color:#0E5A37; padding:8px 14px; border-radius:999px; font-size:13px; font-weight:700;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#2DA05A; animation:livePulse 2s infinite;\"><\u002Fspan>Voting open<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px;\">\n          <div style=\"background:#fff; border:1px solid #E4E0D4; border-radius:13px; padding:18px;\"><div style=\"font-size:12px; color:#5C6B61;\">Votes cast<\u002Fdiv><div style=\"font-family:'Spectral',serif; font-size:30px; font-weight:600; color:#0E5A37; margin-top:4px;\">{{ votesCast }}<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff; border:1px solid #E4E0D4; border-radius:13px; padding:18px;\"><div style=\"font-size:12px; color:#5C6B61;\">Eligible voters<\u002Fdiv><div style=\"font-family:'Spectra ive results<\u002Fh1><p style=\"font-size:13.5px; color:#5C6B61; margin:0;\">Tallies update as each ballot is sealed.<\u002Fp><\u002Fdiv>\n          <div style=\"display:flex; gap:8px;\">\n            <button onclick=\"{{ exportCsv }}\" style=\"background:#fff; border:1px solid #D8D3C4; color:#46554C; border-radius:8px; padding:9px 14px; font-size:12.5px; font-weight:600; cursor:pointer;\">Export CSV<\u002Fbutton>\n            <button onclick=\"{{ exportPdf }}\" style=\"background:#fff; border:1px solid #D8D3C4; color:#46554C; border-radius:8px; padding:9px 14px; font-size:12.5px; font-weight:600; cursor:pointer;\">Export PDF<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:18px;\">\n          <sc-for list=\"{{ resultsPositions }}\" as=\"pos\" hint-placeholder-count=\"5\">\n            <div style=\"background:#fff; border:1px solid #E4E0D4; border-radius:14px; padding:22px;\">\n              <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;\"><h3 style=\"font-family:'Spectral',serif; font-size:18px; font-weight:600; margin:0;\">{{ pos.title }}<\u002Fh3><span style=\"font-size:12.5px; color:#8A968C;\">{{ pos.total }} votes<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:14px;\">\n                <sc-for list=\"{{ pos.candidates }}\" as=\"c\" hint-placeholder-count=\"3\">\n                  <div>\n                    <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;\"><span style=\"font-size:14px; font-weight:600; color:{{ c.nameColor }}; display:flex; align-items:center; gap:8px;\">{{ c.name }}<sc-if value=\"{{ c.leading }}\" hint-placeholder-val=\"\">​<span style=\"font-size:10.5px; font-weight:700; background:#C8932A; color:#16241C; padding:2px 8px; border-radius:99px;\">LEADING<\u002Fspan><\u002Fsc-if><\u002Fspan><span style=\"font-size:13px; color:#5C6B61; rgin-bottom:6px;\">Department<\u002Flabel><input value=\"{{ cfgDept }}\" oninput=\"{{ onCfgDept }}\" style=\"width:100%; padding:11px 13px; border:1.5px solid #D8D3C4; border-radius:9px; font-size:14px; outline:none;\" style-focus=\"border-color:#0E5A37;\"><\u002Fdiv>\n          <div style=\"display:flex; gap:14px;\">\n            <div style=\"flex:1;\"><label style=\"display:block; font-size:12.5px; font-weight:600; color:#46554C; margin-bottom:6px;\">Voting opens<\u002Flabel><input value=\"18 Jun 2026, 9:00 AM\" style=\"width:100%; padding:11px 13px; border:1.5px solid #D8D3C4; border-radius:9px; font-size:14px; outline:none;\"><\u002Fdiv>\n            <div style=\"flex:1;\"><label style=\"display:block; font-size:12.5px; font-weight:600; color:#46554C; margin-bottom:6px;\">Voting closes<\u002Flabel><input value=\"18 Jun 2026, 4:00 PM\" style=\"width:100%; padding:11px 13px; border:1.5px solid #D8D3C4; border-radius:9px; font-size:14px; outline:none;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ saveSettings }}\" style=\"align-self:flex-start; background:#0E5A37; color:#fff; border:none; border-radius:9px; padding:12px 22px; font-size:14px; font-weight:700; cursor:pointer;\" style-hover=\"background:#0B4A2D;\">Save changes<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== OBSERVER ===================== -->\n  <sc-if value=\"{{ isObserver }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"min-height:calc(100vh - 36px); background:#F2F0E6;\">\n    <div style=\"background:#0A3D26; color:#F4F1E6; padding:16px 30px; display:flex; align-items:center; gap:14px;\">\n      <div style=\"width:36px; height:36px; border-radius:8px; background:#0E5A37; border:1px solid #C8932A; display:flex; align-items:center; justify-content:center; flex:none;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F4F1E6\" stroke-width=\"2\"><path d=\"M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n      <div style=\"line-height:1.25;\"><div style=\"font-size:15px; font-weight:700;\">Observer Portal<\u002Fdiv><div style=\"font-size:11.5px; color:#9FBFAE;\">Read-only access · accredited monitor<\u002Fdiv><\u002Fdiv>\n      <span style=\"margin-left:auto; display:flex; align-items:center; gap:8px; background:rgba(45,160,90,.16); color:#9FE3B6; padding:7px 13px; border-radius:999px; font-size:12.5px; font-weight:700;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#2DA05A; animation:livePulse 2s infinite;\"><\u002Fspan>Live<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"max-width:920px; margin:0 auto; padding:30px 24px 60px;\">\n      <div style=\"display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px; flex-wrap:wrap; gap:14px;\">\n        <div><h1 style=\"font-family:'Spectral',serif; font-weight:600; font-size:26px; margin:0 0 4px;\">Results monitor<\u002Fh1><p style=\"font-size:13.5px; color:#5C6B61; margin:0;\">You may view and export results. Editing is disabled for observers.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex; gap:8px;\">\n          <button onclick=\"{{ exportCsv }}\" style=\"background:#fff; border:1px solid #D8D3C4; color:#46554C; border-radius:9px; padding:10px 15px; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:7px;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><path d=\"M7 10l5 5 5-5M12 15V3\"><\u002Fpath><\u002Fsvg>CSV<\u002Fbutton>\n          <button onclick=\"{{ exportXlsx }}\" style=\"background:#fff; border:1px solid #D8D3C4; color:#46554C; border-radius:9px; padding:10px 15px; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:7px;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><path d=\"M7 10l5 5 5-5M12 15V3\"><\u002Fpath><\u002Fsvg>Excel<\u002Fbutton>\n          <button onclick=\"{{ exportPdf }}\" style=\"background:#0E5A37; color:#fff; border:none; border-radius:9px; padding:10px 15px; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:7px;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><path d=\"M7 10l5 5 5-5M12 15V3\"><\u002Fpath><\u002Fsvg>PDF<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:22px;\">\n        <div style=\"background:#fff; border:1px solid #E4E0D4; border-radius:13px; padding:18px;\"><div style=\"font-size:12px; color:#5C6B61;\">Votes cast<\u002Fdiv><div style=\"font-family:'Spectral',serif; font-size:28px; font-weight:600; color:#0E5A37; margin-top:4px;\">{{ votesCast }}<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E4E0D4; border-radius:13px; padding:18px;\"><div style=\"font-size:12px; color:#5C6B61;\">Turnout<\u002Fdiv><div style=\"font-family:'Spectral',serif; font-size:28px; font-weight:600; color:#16241C; margin-top:4px;\">{{ turnoutPct }}%<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff; border:1px solid #E4E0D4; border-radius:13px; padding:18px;\"><div style=\"font-size:12px; color:#5C6B61;\">Flagged attempts<\u002Fdiv><div style=\"font-family:'Spectral',serif; font-size:28px; font-weight:600; color:#B0651F; margin-top:4px;\">{{ flaggedCount }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; gap:18px;\">\n        <sc-for list=\"{{ resultsPositions }}\" as=\"pos\" hint-placeholder-count=\"5\">\n          <div style=\"background:#fff; border:1px solid #E4E0D4; border-radius:14px; padding:22px;\">\n            <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;\"><h3 style=\"font-family:'Spectral',serif; font-size:18px; font-weight:600; margin:0;\">{{ pos.title }}<\u002Fh3><span style=\"font-size:12.5px; color:#8A968C;\">{{ pos.total }} votes<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:14px;\">\n              <sc-for list=\"{{ pos.candidates }}\" as=\"c\" hint-placeholder-count=\"3\">\n                <div>\n                  <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;\"><span style=\"font-size:14px; font-weight:600; color:{{ c.nameColor }}; display:flex; align-items:center; gap:8px;\">{{ c.name }}<sc-if value=\"{{ c.leading }}\" hint-placeholder-val=\"\">​<span style=\"font-size:10.5px; font-weight:700; background:#C8932A; color:#16241C; padding:2px 8px; border-radius:99px;\">LEADING<\u002Fspan><\u002Fsc-if><\u002Fspan><span style=\"font-size:13px; color:#5C6B61;\">{{ c.votes }} · {{ c.pct }}%<\u002Fspan><\u002Fdiv>\n                  <div style=\"height:11px; background:#EDEADD; border-radius:99px; overflow:hidden;\"><div style=\"height:100%; background:{{ c.barColor }}; border-radius:99px; width:{{ c.pct }}%; animation:growBar .8s ease both;\"><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== CANDIDATE MODAL ===================== -->\n  <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"\">\n  <div onclick=\"{{ closeModal }}\" style=\"position:fixed; inset:0; background:rgba(10,30,20,.55); z-index:80; display:flex; align-items:center; justify-content:center; padding:24px; animation:fadeUp .25s ease both;\">\n    <div onclick=\"{{ stopProp }}\" style=\"background:#fff; border-radius:18px; max-width:460px; width:100%; overflow:hidden; box-shadow:0 30px 70px rgba(0,0,0,.4);\">\n      <div style=\"background:{{ modalBg }}; padding:28px; display:flex; align-items:center; gap:16px; color:#fff;\">\n        <div style=\"width:72px; height:72px; border-radius:50%; background:rgba(255,255,255,.2); border:2px solid rgba(255,255,255,.5); font-family:'Spectral',serif; font-size:26px; font-weight:600; display:flex; align-items:center; justify-content:center; flex:none;\">{{ modalInitials }}<\u002Fdiv>\n        <div><div style=\"font-size:11.5px; letter-spacing:.12em; text-transform:uppercase; opacity:.85; font-weight:700;\">{{ modalPosition }}<\u002Fdiv><div style=\"font-family:'Spectral',serif; font-size:23px; font-weight:600; margin-top:2px;\">{{ modalName }}<\u002Fdiv><div style=\"font-size:12.5px; opacity:.85; margin-top:2px;\">{{ modalLevel }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:24px 28px 28px;\">\n        <div style=\"font-size:11.5px; letter-spacing:.08em; text-transform:uppercase; color:#8A968C; font-weight:700; margin-bottom:8px;\">Manifesto<\u002Fdiv>\n        <p style=\"font-size:14.5px; line-height:1.65; color:#3A483F; margin:0 0 18px;\">{{ modalManifesto }}<\u002Fp>\n        <div style=\"display:flex; gap:10px;\">\n          <button onclick=\"{{ closeModal }}\" style=\"flex:1; background:#F2F0E6; border:1px solid #E0DBCC; color:#46554C; border-radius:10px; padding:12px; font-size:14px; font-weight:600; cursor:pointer;\">Close<\u002Fbutton>\n          <sc-if value=\"{{ modalCanSelect }}\" hint-placeholder-val=\"\">\n            <button onclick=\"{{ modalSelect }}\" style=\"flex:1; background:#0E5A37; color:#fff; border:none; border-radius:10px; padding:12px; font-size:14px; font-weight:700; cursor:pointer;\" style-hover=\"background:#0B4A2D;\">Select this candidate<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== TOAST ===================== -->\n  <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"\">\n  <div style=\"position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:#16241C; color:#F4F1E6; padding:13px 22px; border-radius:11px; font-size:13.5px; font-weight:600; box-shadow:0 14px 36px rgba(0,0,0,.3); z-index:90; display:flex; align-items:center; gap:10px; animation:toastIn .3s ease both;\">\n    <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#7FE0A5\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 6\"><\u002Fpath><\u002Fsvg>\n    {{ toast }}\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    const P = (id, title, cands) => ({ id, title, candidates: cands });\n    const c = (id, name, level, bg, votes, manifesto) => ({ id, name, level, avatarBg: bg, votes, manifesto });\n    const G1 = '#0E5A37', G2 = '#137A49', GD = '#0A3D26', GOLD = '#9A6B12', TEAL = '#1F6E5E', OLIVE = '#5C6B1E';\n    const positions = [\n      P('pres', 'President', [\n        c('p1', 'Adeyemi Tunde', 'HND II · Public Admin', G1, 96, 'A transparent administration with monthly open-book accounts and a student welfare desk in every level.'),\n        c('p2', 'Okafor Chidinma', 'ND II · Public Admin', GOLD, 78, 'Stronger industrial-training placements and a peer mentorship scheme pairing finalists with new intakes.'),\n        c('p3', 'Bello Aisha', 'HND I · Public Admin', TEAL, 51, 'Digitised association records and a 24-hour grievance response charter for every student concern.'),\n      ]),\n      P('vp', 'Vice President', [\n        c('v1', 'Lawal Ibrahim', 'HND I · Public Admin', OLIVE, 102, 'Revitalise departmental clubs and host a termly leadership summit with public-sector guests.'),\n        c('v2', 'Eze Ngozi', 'ND II · Public Admin', G2, 118, 'Expand female participation in association leadership and create a study-resource library.'),\n      ]),\n      P('gsec', 'General Secretary', [\n        c('g1', 'Ojo Damilola', 'ND II · Public Admin', GD, 88, 'Publish minutes within 48 hours of every meeting and maintain a live calendar of events.'),\n        c('g2', 'Hassan Fatima', 'HND I · Public Admin', GOLD, 131, 'A single notice board — physical and online — so no student misses an announcement again.'),\n      ]),\n      P('fsec', 'Financial Secretary', [\n        c('f1', 'Adebayo Seun', 'HND II · Public Admin', TEAL, 109, 'Itemised dues, quarterly audits read aloud at congress, and zero hidden levies.'),\n        c('f2', 'Yusuf Maryam', 'ND II · Public Admin', G1, 112, 'A digital dues tracker so every student sees exactly where their money goes.'),\n      ]),\n      P('pro', 'Public Relations Officer', [\n        c('r1', 'Nwosu Emeka', 'ND II · Public Admin', OLIVE, 94, 'Revamp our social presence and broadcast every event in real time to all members.'),\n        c('r2', 'Salami Tobi', 'HND I · Public Admin', GOLD, 125, 'A weekly bulletin and a rapid-response line connecting students to the executive.'),\n      ]),\n    ];\n    const roster = {\n      'PUB/22/001': 'Adeola Bankole',\n      'PUB/22/014': 'Chinedu Okeke',\n      'PUB/22/027': 'Fatima Bello',\n      'PUB/22/043': 'Grace Adeyinka',\n      'PUB/21/008': 'Ibrahim Sule',\n      'PUB/23/102': 'Joy Ekanem',\n      'PUB/22/055': 'Kunle Ajayi',\n      'PUB/23/077': 'Halima Yusuf',\n    };\n    this.state = {\n      view: 'portal',\n      positions,\n      roster,\n      voted: { 'PUB/22/001': true },\n      matricInput: '',\n      loginError: '',\n      currentUser: null,\n      ballotIndex: 0,\n      selections: {},\n      receipt: '',\n      flaggedMatric: '',\n      flagRef: '',\n      flaggedCount: 3,\n      adminTab: 'overview',\n      rosterLoaded: false,\n      newCandPos: 'pres',\n      newCandName: '',\n      modal: null,\n      toast: '',\n      cfg: {\n        institution: 'Oyo State College of Agriculture and Technology',\n        faculty: 'Faculty of Management & Communication Studies',\n        dept: 'Department of Public Administration',\n      },\n    };\n    this._toastTimer = null;\n  }\n\n  go(view) { this.setState({ view }); window.scrollTo(0, 0); }\n  showToast(msg) {\n    if (this._toastTimer) clearTimeout(this._toastTimer);\n    this.setState({ toast: msg });\n    this._toastTimer = setTimeout(() => this.setState({ toast: '' }), 2600);\n  }\n  initialsOf(name) {\n    const parts = name.trim().split(/\\s+/);\n    return ((parts[0] || '')[0] || '' + (parts[1] ? parts[1][0] : '')).toUpperCase().slice(0, 2) || (parts[1] ? (parts[0][0] + parts[1][0]).toUpperCase() : name.slice(0, 2).toUpperCase());\n  }\n  inits(name) {\n    const p = name.trim().split(/\\s+/);\n    return ((p[0] ? p[0][0] : '') + (p[1] ? p[1][0] : '')).toUpperCase();\n  }\n\n  // ---- login ----\n  submitLogin() {\n    const raw = (this.state.matricInput || '').trim().toUpperCase();\n    if (!raw) { this.setState({ loginError: 'Please enter your matriculation number.' }); return; }\n    const name = this.state.roster[raw];\n    if (!name) { this.setState({ loginError: 'This matriculation number is not on the eligible voter roster. Confirm it matches your student record.' }); return; }\n    if (this.state.voted[raw]) {\n      this.setState({ loginError: '', flaggedMatric: raw, flagRef: 'FLG-' + Math.random().toString(36).slice(2, 7).toUpperCase(), flaggedCount: this.state.flaggedCount + 1, view: 'flagged' });\n      window.scrollTo(0, 0); return;\n    }\n    this.setState({ loginError: '', currentUser: { matric: raw, name }, ballotIndex: 0, selections: {}, view: 'ballot' });\n    window.scrollTo(0, 0);\n  }\n  onMatricInput(e) { this.setState({ matricInput: e.target.value, loginError: '' }); }\n  onMatricKey(e) { if (e.key === 'Enter') this.submitLogin(); }\n\n  // ---- ballot ----\n  selectCand(posId, candId) {\n    this.setState(s => ({ selections: { ...s.selections, [posId]: candId }, modal: null }));\n  }\n  abstain(posId) { this.setState(s => { const sel = { ...s.selections }; sel[posId] = '__abstain__'; return { selections: sel }; }); }\n  nextPosition() {\n    const { ballotIndex, positions } = this.state;\n    if (ballotIndex < positions.length - 1) { this.setState({ ballotIndex: ballotIndex + 1 }); window.scrollTo(0, 0); }\n    else { this.setState({ view: 'review' }); window.scrollTo(0, 0); }\n  }\n  prevPosition() {\n    const { ballotIndex } = this.state;\n    if (ballotIndex > 0) { this.setState({ ballotIndex: ballotIndex - 1 }); window.scrollTo(0, 0); }\n    else { this.setState({ view: 'landing' }); window.scrollTo(0, 0); }\n  }\n  editPosition(idx) { this.setState({ ballotIndex: idx, view: 'ballot' }); window.scrollTo(0, 0); }\n  submitBallot() {\n    const { selections, positions, currentUser } = this.state;\n    const newPos = positions.map(p => {\n      const pick = selections[p.id];\n      if (!pick || pick === '__abstain__') return p;\n      return { ...p, candidates: p.candidates.map(c => c.id === pick ? { ...c, votes: c.votes + 1 } : c) };\n    });\n    const voted = { ...this.state.voted };\n    if (currentUser) voted[currentUser.matric] = true;\n    this.setState({ positions: newPos, voted, receipt: 'OYS-' + Math.random().toString(36).slice(2, 6).toUpperCase() + '-' + Math.random().toString(36).slice(2, 6).toUpperCase(), view: 'success' });\n    window.scrollTo(0, 0);\n  }\n\n  // ---- admin ----\n  addCandidate() {\n    const name = (this.state.newCandName || '').trim();\n    if (!name) { this.showToast('Enter a candidate name first.'); return; }\n    const palette = ['#0E5A37', '#9A6B12', '#1F6E5E', '#5C6B1E', '#137A49', '#0A3D26'];\n    const bg = palette[Math.floor(Math.random() * palette.length)];\n    const positions = this.state.positions.map(p => p.id === this.state.newCandPos\n      ? { ...p, candidates: [...p.candidates, { id: 'n' + Date.now(), name, level: 'Public Admin', avatarBg: bg, votes: 0, manifesto: 'Manifesto pending submission to the electoral committee.' }] }\n      : p);\n    this.setState({ positions, newCandName: '' });\n    this.showToast('Candidate added.');\n  }\n  loadRoster() { this.setState({ rosterLoaded: true }); this.showToast('Roster uploaded · 312 voters validated.'); }\n  saveSettings() { this.showToast('Election settings saved.'); }\n  export(kind) { this.showToast('Generating ' + kind + ' report…'); }\n\n  renderVals() {\n    const s = this.state;\n    const view = s.view;\n    const positions = s.positions;\n    const totalEligible = 312;\n    const presTotal = positions[0].candidates.reduce((a, c) => a + c.votes, 0);\n    const votesCast = presTotal;\n    const turnoutPct = Math.round((votesCast / totalEligible) * 100);\n\n    const navStyle = (active) => `border:none; border-radius:7px; padding:6px 13px; font-size:12px; font-weight:600; cursor:pointer; transition:background .15s ease; background:${active ? '#C8932A' : 'rgba(255,255,255,.08)'}; color:${active ? '#16241C' : '#CFE6D8'};`;\n    const sideStyle = (active) => `text-align:left; border:none; border-radius:9px; padding:10px 13px; font-size:13.5px; font-weight:600; cursor:pointer; margin-bottom:3px; transition:background .15s ease; background:${active ? '#0E5A37' : 'transparent'}; color:${active ? '#fff' : '#A9C4B5'};`;\n\n    // ballot current\n    const idx = s.ballotIndex;\n    const pos = positions[Math.min(idx, positions.length - 1)] || positions[0];\n    const sel = s.selections[pos.id];\n    const currentCandidates = pos.candidates.map(cd => {\n      const selected = sel === cd.id;\n      return {\n        ...cd,\n        initials: this.inits(cd.name),\n        selected,\n        borderColor: selected ? '#0E5A37' : '#E8E4D6',\n        shadow: selected ? '0 10px 26px rgba(14,90,55,.18)' : '0 2px 8px rgba(0,0,0,.04)',\n        onSelect: () => this.selectCand(pos.id, cd.id),\n        onView: (e) => { if (e && e.stopPropagation) e.stopPropagation(); this.setState({ modal: { ...cd, positionTitle: pos.title, posId: pos.id } }); },\n      };\n    });\n\n    // review\n    const reviewItems = positions.map(p => {\n      const pick = s.selections[p.id];\n      const cd = p.candidates.find(c => c.id === pick);\n      if (!cd) return { position: p.title, name: 'No selection (abstained)', initials: '—', avatarBg: '#9AA89D', nameColor: '#8A968C', onEdit: () => this.editPosition(positions.indexOf(p)) };\n      return { position: p.title, name: cd.name, initials: this.inits(cd.name), avatarBg: cd.avatarBg, nameColor: '#16241C', onEdit: () => this.editPosition(positions.indexOf(p)) };\n    });\n\n    // results\n    const barPalette = ['#0E5A37', '#C8932A', '#1F6E5E', '#5C6B1E', '#137A49', '#0A3D26'];\n    const resultsPositions = positions.map(p => {\n      const total = p.candidates.reduce((a, c) => a + c.votes, 0);\n      const max = Math.max(...p.candidates.map(c => c.votes), 0);\n      return {\n        title: p.title,\n        total,\n        candidates: p.candidates.map((c, i) => ({\n          name: c.name,\n          votes: c.votes,\n          pct: total ? Math.round((c.votes / total) * 100) : 0,\n          leading: c.votes === max && total > 0,\n          barColor: c.votes === max ? '#C8932A' : barPalette[i % barPalette.length],\n          nameColor: '#16241C',\n        })),\n      };\n    });\n\n    // admin candidates view\n    const adminPositions = positions.map(p => ({\n      title: p.title,\n      count: p.candidates.length,\n      candidates: p.candidates.map(c => ({ name: c.name, level: c.level, avatarBg: c.avatarBg, initials: this.inits(c.name) })),\n    }));\n    const positionOptions = positions.map(p => ({ id: p.id, title: p.title }));\n\n    // roster rows\n    const rosterRows = Object.keys(s.roster).map(m => {\n      const v = !!s.voted[m];\n      return { matric: m, name: s.roster[m], status: v ? 'Voted' : 'Not voted', badgeBg: v ? '#E2F0E7' : '#F2EFE4', badgeColor: v ? '#0E5A37' : '#8A968C' };\n    });\n\n    // modal\n    const m = s.modal;\n\n    return {\n      // view flags\n      isPortal: view === 'portal', isLanding: view === 'landing', isLogin: view === 'login',\n      isBallot: view === 'ballot', isReview: view === 'review', isSuccess: view === 'success',\n      isFlagged: view === 'flagged', isAdmin: view === 'admin', isObserver: view === 'observer',\n\n      // nav\n      goPortal: () => this.go('portal'),\n      goLandingVoter: () => this.go('landing'),\n      goLogin: () => { this.setState({ matricInput: '', loginError: '' }); this.go('login'); },\n      goAdmin: () => this.go('admin'),\n      goObserver: () => this.go('observer'),\n      navHomeStyle: navStyle(view === 'portal'),\n      navVoterStyle: navStyle(['landing', 'login', 'ballot', 'review', 'success', 'flagged'].includes(view)),\n      navAdminStyle: navStyle(view === 'admin'),\n      navObserverStyle: navStyle(view === 'observer'),\n\n      // login\n      matricInput: s.matricInput,\n      loginError: s.loginError,\n      onMatricInput: (e) => this.onMatricInput(e),\n      onMatricKey: (e) => this.onMatricKey(e),\n      submitLogin: () => this.submitLogin(),\n\n      // ballot\n      currentUserName: s.currentUser ? s.currentUser.name : 'Student',\n      positionNumber: idx + 1,\n      totalPositions: positions.length,\n      progressPct: Math.round(((idx + 1) / positions.length) * 100),\n      currentPositionTitle: pos.title,\n      currentCandidates,\n      ballotKey: 'pos-' + idx,\n      prevLabel: idx === 0 ? 'Back' : 'Previous',\n      nextLabel: idx === positions.length - 1 ? 'Review ballot' : 'Next position',\n      selectedCountLabel: sel ? (sel === '__abstain__' ? 'Abstained' : 'Selection made') : 'No selection yet',\n      prevPosition: () => this.prevPosition(),\n      nextPosition: () => this.nextPosition(),\n      abstainCurrent: () => this.abstain(pos.id),\n\n      // review\n      reviewItems,\n      submitBallot: () => this.submitBallot(),\n      backToBallot: () => { this.setState({ view: 'ballot' }); window.scrollTo(0, 0); },\n\n      // success / flagged\n      receipt: s.receipt,\n      flaggedMatric: s.flaggedMatric,\n      flagRef: s.flagRef,\n\n      // admin\n      setAdminOverview: () => this.setState({ adminTab: 'overview' }),\n      setAdminCandidates: () => this.setState({ adminTab: 'candidates' }),\n      setAdminEligibility: () => this.setState({ adminTab: 'eligibility' }),\n      setAdminResults: () => this.setState({ adminTab: 'results' }),\n      setAdminSettings: () => this.setState({ adminTab: 'settings' }),\n      admOverviewStyle: sideStyle(s.adminTab === 'overview'),\n      admCandidatesStyle: sideStyle(s.adminTab === 'candidates'),\n      admEligibilityStyle: sideStyle(s.adminTab === 'eligibility'),\n      admResultsStyle: sideStyle(s.adminTab === 'results'),\n      admSettingsStyle: sideStyle(s.adminTab === 'settings'),\n      admIsOverview: s.adminTab === 'overview',\n      admIsCandidates: s.adminTab === 'candidates',\n      admIsEligibility: s.adminTab === 'eligibility',\n      admIsResults: s.adminTab === 'results',\n      admIsSettings: s.adminTab === 'settings',\n\n      votesCast, totalEligible, turnoutPct, flaggedCount: s.flaggedCount,\n\n      adminPositions, positionOptions, resultsPositions,\n      newCandPos: s.newCandPos, newCandName: s.newCandName,\n      onNewCandPos: (e) => this.setState({ newCandPos: e.target.value }),\n      onNewCandName: (e) => this.setState({ newCandName: e.target.value }),\n      addCandidate: () => this.addCandidate(),\n\n      rosterLoaded: s.rosterLoaded, rosterNotLoaded: !s.rosterLoaded,\n      rosterRows, loadRoster: () => this.loadRoster(),\n\n      cfgInstitution: s.cfg.institution, cfgFaculty: s.cfg.faculty, cfgDept: s.cfg.dept,\n      onCfgInstitution: (e) => this.setState({ cfg: { ...s.cfg, institution: e.target.value } }),\n      onCfgFaculty: (e) => this.setState({ cfg: { ...s.cfg, faculty: e.target.value } }),\n      onCfgDept: (e) => this.setState({ cfg: { ...s.cfg, dept: e.target.value } }),\n      saveSettings: () => this.saveSettings(),\n\n      // export\n      exportCsv: () => this.export('CSV'),\n      exportXlsx: () => this.export('Excel'),\n      exportPdf: () => this.export('PDF'),\n\n      // modal\n      modalOpen: !!m,\n      modalInitials: m ? this.inits(m.name) : '',\n      modalName: m ? m.name : '',\n      modalLevel: m ? m.level : '',\n      modalPosition: m ? m.positionTitle : '',\n      modalManifesto: m ? m.manifesto : '',\n      modalBg: m ? m.avatarBg : '#0E5A37',\n      modalCanSelect: !!m && view === 'ballot',\n      modalSelect: () => { if (m) this.selectCand(m.posId, m.id); },\n      closeModal: () => this.setState({ modal: null }),\n      stopProp: (e) => { if (e && e.stopPropagation) e.stopPropagation(); },\n\n      // toast\n      toast: s.toast,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
