services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pasa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pasa_password}
      POSTGRES_DB: ${POSTGRES_DB:-pasa_election}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Exposed on localhost only, so `pnpm dev` can use it during local
      # development (`docker compose up -d db`). Safe to remove in production.
      - "127.0.0.1:5544:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pasa} -d ${POSTGRES_DB:-pasa_election}"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-pasa}:${POSTGRES_PASSWORD:-pasa_password}@db:5432/${POSTGRES_DB:-pasa_election}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-please-change-this-to-a-long-random-string-min-32}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@oyscatech.edu.ng}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe!Admin2026}
      OBSERVER_EMAIL: ${OBSERVER_EMAIL:-observer@oyscatech.edu.ng}
      OBSERVER_PASSWORD: ${OBSERVER_PASSWORD:-ChangeMe!Observer2026}
      # Set to "true" the FIRST time you start to load demo data. Switch to
      # "false" afterwards so restarts don't reset the election.
      SEED_ON_START: ${SEED_ON_START:-true}
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  pgdata:
